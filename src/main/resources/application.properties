spring.application.name=JWT_Token

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/jwt_db
spring.datasource.username=root
spring.datasource.password=admin
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT — set real values via environment variables in production
app.jwt.secret=${JWT_SECRET:7Zn2r5u8x/A?D(G+KbPeShVmYq3t6w9y$B&E)H@McQfTjWnZr4u7x!A%D*G-Ja}
app.jwt.expiration=${JWT_EXPIRATION:3600000}
